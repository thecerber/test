services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-dev:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-app}-backend:latest
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: ${APP_SECRET:-dev_secret_change_in_production_use_openssl_rand_hex_32}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?'
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend-prod:
    profiles: [prod]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-app}-backend:latest
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-change_me_use_strong_secret_in_production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?'
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_TARGET: "http://backend-dev:${BACKEND_PORT:-8080}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    depends_on:
      - backend-dev

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PROD_PORT:-3000}:80"
    depends_on:
      - backend-prod

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
